server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/movie_tickets?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# JWT配置
jwt:
  secret: MovieTicketsSecretKey2026VintageFilmStyleVeryLongSecretKey
  expiration: 86400000  # 24小时，单位毫秒
  header: Authorization
  prefix: Bearer 

# 座位锁定配置
seat:
  lock:
    duration: 300  # 座位锁定时间，单位秒（5分钟）

logging:
  level:
    com.movietickets: DEBUG
    org.hibernate.SQL: DEBUG
